services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:latest
    volumes:
      - ./data:/app/data
      - ./app/core/param_mapping.json:/app/app/core/param_mapping.json
    depends_on:
      - ollama

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "8501:8501"
    environment:
      - RF2_API_URL=http://backend:8000
    volumes:
      - ./app/core/fixed_params.json:/app/app/core/fixed_params.json
    depends_on:
      - backend

  test:
    build:
      context: .
      target: test
    volumes:
      - .:/app          # full source bind-mount so edits are reflected without rebuild
    working_dir: /app
    profiles:
      - test            # not started by `docker compose up`; run with `docker compose run --rm test`
    command: ["pytest", "tests/", "--ignore=tests/integration", "-v"]

volumes:
  ollama_data:
