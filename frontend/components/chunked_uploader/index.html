<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 6px 0;
      background: transparent;
      font-family: "Source Sans Pro", sans-serif;
      font-size: 14px;
      color: rgb(250, 250, 250);
    }
    #drop-zone {
      border: 1px solid rgba(250, 250, 250, 0.2);
      border-radius: 0.5rem;
      padding: 0.75rem;
      text-align: left;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    #drop-zone.hovering {
      border-color: rgb(255, 75, 75);
      background: rgba(255, 75, 75, 0.08);
      box-shadow: 0 0 0 1px rgba(255, 75, 75, 0.25) inset;
    }
    #drop-zone.done {
      border-color: #21c354;
      box-shadow: 0 0 0 1px rgba(33, 195, 84, 0.2) inset;
    }
    #drop-zone.error-state {
      border-color: #ff4b4b;
      box-shadow: 0 0 0 1px rgba(255, 75, 75, 0.25) inset;
    }
    #title {
      margin: 0 0 0.25rem 0;
      font-size: 0.95rem;
      font-weight: 600;
      color: rgb(250, 250, 250);
    }
    #help-text {
      margin: 0 0 0.65rem 0;
      font-size: 0.8rem;
      color: rgba(250, 250, 250, 0.65);
    }
    #browse-btn {
      display: inline-block;
      padding: 0.35rem 0.9rem;
      border: 1px solid rgba(250, 250, 250, 0.2);
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: rgb(250, 250, 250);
    }
    #browse-btn:hover { background: rgba(255, 255, 255, 0.08); }
    #filename-row {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 0.75rem;
      font-size: 0.82rem;
      color: rgba(250, 250, 250, 0.9);
      word-break: break-all;
    }
    #filename-row .ic { font-size: 16px; }
    #progress-wrap {
      display: none;
      margin-top: 0.75rem;
    }
    progress {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      appearance: none;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.1);
    }
    progress::-webkit-progress-bar  { background: rgba(255,255,255,0.1); border-radius: 3px; }
    progress::-webkit-progress-value { background: #21c354; border-radius: 3px; }
    progress::-moz-progress-bar     { background: #21c354; border-radius: 3px; }
    #status-msg {
      font-size: 12px;
      margin-top: 4px;
      color: rgba(250,250,250,0.55);
    }
    #status-msg.ok  { color: #21c354; }
    #status-msg.err { color: #ff4b4b; }
  </style>
</head>
<body>
  <div id="drop-zone">
    <p id="title">Sube tu archivo</p>
    <p id="help-text">Arrastra y suelta o selecciona un archivo</p>
    <div id="browse-btn">Seleccionar archivo</div>
    <input type="file" id="file-input" style="display:none">
    <div id="filename-row"><span class="ic">📄</span><span id="filename-text"></span></div>
  </div>
  <div id="progress-wrap">
    <progress id="pgbar" value="0" max="100"></progress>
    <div id="status-msg"></div>
  </div>

  <script>
    /* ------------------------------------------------------------------ *
     * Streamlit bi-directional component protocol
     * ------------------------------------------------------------------ */
    let _props = {};
    let _uploadResult = null;
    let _uploadStartedAt = null;
    let _statusTimer = null;
    let _baseStatus = "";
    let _statusErr = false;
    let _uploadedBytes = null;
    let _totalBytes = null;

    function _sendReady() {
      window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
        "*"
      );
    }

    function _sendValue(value) {
      window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value },
        "*"
      );
    }

    window.addEventListener("message", function (evt) {
      if (!evt.data || evt.data.type !== "streamlit:render") return;
      _props = evt.data.args || {};

      if (_props.label) document.getElementById("title").textContent = _props.label;
      if (_props.help_text) document.getElementById("help-text").textContent = _props.help_text;
      if (_props.file_types) {
        document.getElementById("file-input").accept =
          _props.file_types.map(function (t) { return "." + t; }).join(",");
      }

      // Restore previously uploaded file state on re-render
      if (_uploadResult) {
        _showDone(_uploadResult.filename);
      }
    });

    _sendReady();

    /* ------------------------------------------------------------------ *
     * UI interactions
     * ------------------------------------------------------------------ */
    var dropZone  = document.getElementById("drop-zone");
    var fileInput = document.getElementById("file-input");

    dropZone.addEventListener("click", function () { fileInput.click(); });
    document.getElementById("browse-btn").addEventListener("click", function (e) {
      e.stopPropagation();
      fileInput.click();
    });
    dropZone.addEventListener("dragover", function (e) {
      e.preventDefault();
      dropZone.classList.add("hovering");
    });
    dropZone.addEventListener("dragleave", function () {
      dropZone.classList.remove("hovering");
    });
    dropZone.addEventListener("drop", function (e) {
      e.preventDefault();
      dropZone.classList.remove("hovering");
      if (e.dataTransfer.files.length > 0) _handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", function () {
      if (this.files.length > 0) _handleFile(this.files[0]);
    });

    /* ------------------------------------------------------------------ *
     * Chunked upload logic
     * ------------------------------------------------------------------ */
    async function _handleFile(file) {
      var chunkSize  = (_props.chunk_size  || 0) > 0 ? _props.chunk_size  : 16 * 1024 * 1024;
      var baseUrl    = _props.browser_api_base_url || "";
      var sessionId  = _props.client_session_id   || "";

      _uploadStartedAt = Date.now();
      _startStatusTimer();
      _setStatus("Preparando subida…", false, 0, file.size);
      _showProgress(true);
      document.getElementById("pgbar").value = 0;
      dropZone.className = "";

      // --- 1. Init ---------------------------------------------------------
      _setStatus("Iniciando subida…", false, 0, file.size);
      var initResp;
      try {
        initResp = await fetch(baseUrl + "/uploads/init", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-Client-Session-Id": sessionId },
          credentials: "include",
          body: JSON.stringify({ filename: file.name }),
        });
      } catch (err) {
        return _showError("Error de red al iniciar: " + err.message);
      }
      if (!initResp.ok) return _showError("Error al iniciar subida (" + initResp.status + ")");
      var initData = await initResp.json();
      var uploadId = initData.upload_id;
      var serverChunkSize = initData.chunk_size || chunkSize;

      // --- 2. Upload chunks ------------------------------------------------
      var totalChunks = Math.ceil(file.size / serverChunkSize);
      for (var i = 0; i < totalChunks; i++) {
        var start = i * serverChunkSize;
        var chunk = file.slice(start, start + serverChunkSize);
        var uploadedBytes = Math.min((i * serverChunkSize), file.size);
        document.getElementById("pgbar").value = Math.round((uploadedBytes / file.size) * 95);
        _setStatus(
          "Subiendo… fragmento " + (i + 1) + " / " + totalChunks,
          false,
          uploadedBytes,
          file.size
        );
        var chunkResp;
        try {
          chunkResp = await fetch(
            baseUrl + "/uploads/" + uploadId + "/chunk?chunk_index=" + i,
            {
              method: "PUT",
              headers: { "Content-Type": "application/octet-stream", "X-Client-Session-Id": sessionId },
              credentials: "include",
              body: chunk,
            }
          );
        } catch (err) {
          return _showError("Error de red en fragmento " + i + ": " + err.message);
        }
        if (!chunkResp.ok) return _showError("Error en fragmento " + i + " (" + chunkResp.status + ")");
      }

      // --- 3. Complete -----------------------------------------------------
      _setStatus("Finalizando subida…", false, file.size, file.size);
      var complResp;
      try {
        complResp = await fetch(baseUrl + "/uploads/" + uploadId + "/complete", {
          method: "POST",
          headers: { "X-Client-Session-Id": sessionId },
          credentials: "include",
        });
      } catch (err) {
        return _showError("Error al finalizar: " + err.message);
      }
      if (!complResp.ok) return _showError("Error al finalizar (" + complResp.status + ")");
      var complData = await complResp.json();

      document.getElementById("pgbar").value = 100;
      _uploadResult = {
        filename: file.name,
        upload_id: uploadId,
        session_id: sessionId,
        bytes_received: complData.bytes_received || file.size,
      };
      _stopStatusTimer();
      _showDone(file.name);
      _sendValue(_uploadResult);
    }

    /* ------------------------------------------------------------------ *
     * UI helpers
     * ------------------------------------------------------------------ */
    function _showProgress(visible) {
      document.getElementById("progress-wrap").style.display = visible ? "block" : "none";
    }

    function _setStatus(msg, isErr, uploadedBytes, totalBytes) {
      _baseStatus = msg || "";
      _statusErr = !!isErr;
      _uploadedBytes = (typeof uploadedBytes === "number") ? uploadedBytes : null;
      _totalBytes = (typeof totalBytes === "number") ? totalBytes : null;
      _renderStatus();
    }

    function _showDone(filename) {
      dropZone.classList.remove("hovering", "error-state");
      dropZone.classList.add("done");
      document.getElementById("filename-row").style.display = "flex";
      document.getElementById("filename-text").textContent = filename;
      _showProgress(true);
      document.getElementById("pgbar").value = 100;
      _setStatus("Subida completada", false, _uploadResult ? _uploadResult.bytes_received : null, _uploadResult ? _uploadResult.bytes_received : null);
    }

    function _showError(msg) {
      _stopStatusTimer();
      dropZone.classList.add("error-state");
      _setStatus(msg, true, null, null);
      _showProgress(true);
    }

    function _startStatusTimer() {
      _stopStatusTimer();
      _statusTimer = window.setInterval(function () {
        _renderStatus();
      }, 1000);
    }

    function _stopStatusTimer() {
      if (_statusTimer) {
        window.clearInterval(_statusTimer);
        _statusTimer = null;
      }
    }

    function _formatBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes < 0) return "0 B";
      var units = ["B", "KB", "MB", "GB"];
      var value = bytes;
      var index = 0;
      while (value >= 1024 && index < units.length - 1) {
        value /= 1024;
        index += 1;
      }
      return value.toFixed(index === 0 ? 0 : 1) + " " + units[index];
    }

    function _formatElapsed(ms) {
      var totalSeconds = Math.max(0, Math.floor(ms / 1000));
      var minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      var seconds = String(totalSeconds % 60).padStart(2, "0");
      return minutes + ":" + seconds;
    }

    function _renderStatus() {
      var el = document.getElementById("status-msg");
      var parts = [];
      if (_baseStatus) parts.push(_baseStatus);
      if (_uploadedBytes !== null && _totalBytes !== null && _totalBytes > 0) {
        parts.push(_formatBytes(_uploadedBytes) + " / " + _formatBytes(_totalBytes));
      }
      if (_uploadStartedAt) {
        parts.push(_formatElapsed(Date.now() - _uploadStartedAt));
      }
      el.textContent = parts.join(" · ");
      el.className = _statusErr ? "err" : "";
    }
  </script>
</body>
</html>
