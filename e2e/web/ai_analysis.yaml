appId: web
---
# Prerequisite: backend running at :8000 with Ollama + model loaded
# Prerequisite: Streamlit running at :8501 with files already uploaded
# Run upload_telemetry.yaml first, or ensure session state has files loaded

- launchApp:
    browser: chrome
    url: "http://localhost:8501"

# Verify the app loads
- assertVisible: "rFactor2 Engineer"

# Navigate to AI Analysis tab
- tapOn: "🤖"

# Trigger analysis
- tapOn: "Analizar"

# Wait for results (LLM can be slow — Maestro will retry for 30s by default)
- assertVisible: "Análisis de Conducción"

# Verify chief engineer output is present
- assertVisible: "Ingeniero Jefe"
