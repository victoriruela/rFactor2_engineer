openapi: 3.0.0
info:
  title: rFactor2 Engineer Backend API
  version: 3.0.0
  description: RESTful API for AI-powered sim-racing telemetry analysis and vehicle setup recommendations. All file parsing is done client-side (WASM); the backend only runs the AI analysis pipeline.
  license:
    name: MIT

servers:
  - url: http://localhost:8080/api
    description: Local development server
  - url: https://telemetria.bot.nu/api
    description: Production server

tags:
  - name: Health
    description: Service health and readiness
  - name: Auth
    description: User registration, verification, and login
  - name: Analysis
    description: AI-powered telemetry and setup analysis (client-preparsed payload only)
  - name: Models
    description: Available LLM models
  - name: Tracks
    description: Track library (AIW-derived JSON)

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                  uptime:
                    type: integer

  /analyze_preparsed:
    post:
      tags: [Analysis]
      summary: Analyze client-preparsed telemetry/setup payload
      operationId: analyzePreparsed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channels:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: number
                time_col:
                  type: string
                lap_col:
                  type: string
                session_stats:
                  $ref: '#/components/schemas/SessionStats'
                setup:
                  type: object
                  properties:
                    sections:
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          name:
                            type: string
                          params:
                            type: object
                            additionalProperties:
                              type: string
                          read_only_params:
                            type: array
                            items:
                              type: string
                model:
                  type: string
                provider:
                  type: string
                  enum: [ollama_cloud]
                ollama_base_url:
                  type: string
                ollama_api_key:
                  type: string
                fixed_params:
                  type: array
                  items:
                    type: string
              required: [channels, setup]
      responses:
        '200':
          description: Analysis results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'

  /analyze_preparsed_stream:
    post:
      tags: [Analysis]
      summary: Analyze client-preparsed telemetry/setup payload with SSE progress events
      operationId: analyzePreparsedStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channels:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: number
                time_col:
                  type: string
                lap_col:
                  type: string
                session_stats:
                  $ref: '#/components/schemas/SessionStats'
                setup:
                  type: object
                model:
                  type: string
                provider:
                  type: string
                  enum: [ollama_cloud]
                ollama_base_url:
                  type: string
                ollama_api_key:
                  type: string
                fixed_params:
                  type: array
                  items:
                    type: string
              required: [channels, setup]
      responses:
        '200':
          description: Server-Sent Events stream ending with an AnalysisResponse result payload
          content:
            text/event-stream:
              schema:
                type: string

  /models:
    get:
      tags: [Models]
      summary: List available LLM models
      operationId: getModels
      parameters:
        - name: ollama_base_url
          in: query
          schema:
            type: string
        - name: ollama_api_key
          in: query
          schema:
            type: string
        - name: model
          in: query
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
            enum: [ollama_cloud]
      responses:
        '200':
          description: Available models
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      type: string

  /tracks:
    get:
      tags: [Tracks]
      summary: List available tracks
      operationId: listTracks
      responses:
        '200':
          description: Track list

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 3
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
              required: [username, email, password]
      responses:
        '201':
          description: User registered, verification code sent
        '400':
          description: Validation error
        '409':
          description: Username or email already exists

  /auth/verify:
    post:
      tags: [Auth]
      summary: Verify email with code
      operationId: authVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                code:
                  type: string
              required: [email, code]
      responses:
        '200':
          description: Email verified
        '400':
          description: Invalid or expired code

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive JWT
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        '200':
          description: Login successful with JWT token and user config
        '401':
          description: Invalid credentials or unverified account

  /auth/config:
    put:
      tags: [Auth]
      summary: Update user Ollama config (requires JWT)
      operationId: authUpdateConfig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ollama_api_key:
                  type: string
                ollama_model:
                  type: string
      responses:
        '200':
          description: Config updated
        '401':
          description: Unauthorized

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                  uptime:
                    type: integer

  /sessions:
    get:
      tags: [Sessions]
      summary: List sessions for current client
      operationId: listSessions
      parameters:
        - name: X-Client-Session-Id
          in: header
          schema:
            type: string
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        telemetry:
                          type: string
                        svm:
                          type: string

  /sessions/{sessionId}/file/{filename}:
    get:
      tags: [Sessions]
      summary: Download a session file
      operationId: getSessionFile
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File contents
        '404':
          description: File not found

  /uploads/init:
    post:
      tags: [Upload]
      summary: Initialize chunked upload
      operationId: initUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                total_size:
                  type: integer
                  format: int64
              required: [filename, total_size]
      responses:
        '200':
          description: Upload initialized
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_id:
                    type: string

  /uploads/{uploadId}/chunk:
    put:
      tags: [Upload]
      summary: Upload a chunk
      operationId: uploadChunk
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
        - name: chunk_index
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Chunk received

  /uploads/{uploadId}/complete:
    post:
      tags: [Upload]
      summary: Complete chunked upload
      operationId: completeUpload
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Upload finalized
          content:
            application/json:
              schema:
                type: object
                properties:
                  filename:
                    type: string
                  session_id:
                    type: string
                  bytes_received:
                    type: integer

  /setup/{sessionId}:
    get:
      tags: [Analysis]
      summary: Retrieve full setup for a stored session
      operationId: getSessionSetup
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: X-Client-Session-Id
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Full setup parsed from the session SVM file
          content:
            application/json:
              schema:
                type: object
                properties:
                  full_setup:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        $ref: '#/components/schemas/SetupChange'
        '404':
          description: Session or SVM file not found

  /analyze:
    post:
      tags: [Analysis]
      summary: Analyze telemetry and setup files
      operationId: analyzeTelemetry
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                telemetry_file:
                  type: string
                  format: binary
                svm_file:
                  type: string
                  format: binary
                model:
                  type: string
                provider:
                  type: string
                  enum: [ollama_cloud]
                fixed_params:
                  type: string
                  description: JSON array of parameter names to lock
                ollama_base_url:
                  type: string
                ollama_api_key:
                  type: string
              required: [telemetry_file, svm_file]
      responses:
        '200':
          description: Analysis results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '500':
          description: Analysis error

  /analyze_session:
    post:
      tags: [Analysis]
      summary: Analyze a stored session
      operationId: analyzeSession
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                model:
                  type: string
                provider:
                  type: string
                  enum: [ollama_cloud]
                ollama_base_url:
                  type: string
                ollama_api_key:
                  type: string
              required: [session_id]
      responses:
        '200':
          description: Analysis results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'

  /analyze_preparsed:
    post:
      tags: [Analysis]
      summary: Analyze client-preparsed telemetry/setup payload
      operationId: analyzePreparsed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channels:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: number
                time_col:
                  type: string
                lap_col:
                  type: string
                session_stats:
                  $ref: '#/components/schemas/SessionStats'
                setup:
                  type: object
                  properties:
                    sections:
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          name:
                            type: string
                          params:
                            type: object
                            additionalProperties:
                              type: string
                          read_only_params:
                            type: array
                            items:
                              type: string
                model:
                  type: string
                provider:
                  type: string
                  enum: [ollama_cloud]
                ollama_base_url:
                  type: string
                ollama_api_key:
                  type: string
                fixed_params:
                  type: array
                  items:
                    type: string
              required: [channels, setup]
      responses:
        '200':
          description: Analysis results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'

  /analyze_preparsed_stream:
    post:
      tags: [Analysis]
      summary: Analyze client-preparsed telemetry/setup payload with SSE progress events
      operationId: analyzePreparsedStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channels:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: number
                time_col:
                  type: string
                lap_col:
                  type: string
                session_stats:
                  $ref: '#/components/schemas/SessionStats'
                setup:
                  type: object
                model:
                  type: string
                provider:
                  type: string
                  enum: [ollama_cloud]
                ollama_base_url:
                  type: string
                ollama_api_key:
                  type: string
                fixed_params:
                  type: array
                  items:
                    type: string
              required: [channels, setup]
      responses:
        '200':
          description: Server-Sent Events stream ending with an AnalysisResponse result payload
          content:
            text/event-stream:
              schema:
                type: string

  /session_telemetry:
    post:
      tags: [Analysis]
      summary: Load telemetry data for a stored session without running AI analysis
      operationId: loadSessionTelemetry
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                session_id:
                  type: string
              required: [session_id]
      responses:
        '200':
          description: Telemetry payload with map, lap stats and timeseries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'

  /models:
    get:
      tags: [Models]
      summary: List available LLM models
      operationId: getModels
      parameters:
        - name: ollama_base_url
          in: query
          schema:
            type: string
        - name: ollama_api_key
          in: query
          schema:
            type: string
        - name: model
          in: query
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
            enum: [ollama_cloud]
      responses:
        '200':
          description: Available models
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      type: string

  /tracks:
    get:
      tags: [Tracks]
      summary: List available tracks
      operationId: listTracks
      responses:
        '200':
          description: Track list

components:
  schemas:
    SetupChange:
      type: object
      properties:
        parameter:
          type: string
        old_value:
          type: string
        new_value:
          type: string
        reason:
          type: string
        change_pct:
          type: string
    AnalysisResponse:
      type: object
      properties:
        driving_analysis:
          type: string
          description: Driving improvement points in Spanish (variable number based on telemetry data)
        setup_analysis:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/SetupChange'
        full_setup:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/SetupChange'
        agent_reports:
          type: array
          items:
            type: object
        setup_agent_reports:
          type: array
          items:
            type: object
        chief_reasoning:
          type: string
        llm_provider:
          type: string
        llm_model:
          type: string
    LapStats:
      type: object
      properties:
        lap:
          type: integer
        duration:
          type: number
        avg_speed:
          type: number
        max_speed:
          type: number
        avg_throttle:
          type: number
        max_throttle:
          type: number
        avg_brake:
          type: number
        max_brake:
          type: number
        avg_rpm:
          type: number
    SessionStats:
      type: object
      properties:
        circuit_name:
          type: string
        total_laps:
          type: integer
        best_lap_time:
          type: number
        avg_lap_time:
          type: number
        laps:
          type: array
          items:
            $ref: '#/components/schemas/LapStats'
