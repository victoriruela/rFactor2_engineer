[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line too long — prompt strings and DataFrame ops exceed 120 chars
    "E741",  # ambiguous variable name — common in data processing loops (l, I, O)
]

[tool.ruff.lint.per-file-ignores]
"frontend/streamlit_app.py" = ["E402"]  # Streamlit apps use late imports after st.set_page_config
"app/main.py" = ["E402"]               # Import after Pydantic model definitions
"tests/test_main.py" = ["E402"]        # Import after FIXTURES_DIR constant
