services:
  backend:
    build:
      context: ..
      target: backend
    ports:
      - "127.0.0.1:18000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:latest
    volumes:
      - ../data:/app/data
      - ../app/core/param_mapping.json:/app/app/core/param_mapping.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      target: frontend
    ports:
      - "127.0.0.1:18501:8501"
    environment:
      - RF2_API_URL=http://backend:8000
      - RF2_FRONTEND_MAX_PREVIEW_MAT_MB=800
    volumes:
      - ../app/core/fixed_params.json:/app/app/core/fixed_params.json
      - ../frontend/streamlit_app.py:/app/frontend/streamlit_app.py
    depends_on:
      - backend
    restart: unless-stopped

  test:
    build:
      context: ..
      target: test
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - RF2_API_URL=http://host.docker.internal:18000
    volumes:
      - ..:/app
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - test
    command: ["pytest", "tests/", "--ignore=tests/integration", "-v"]
