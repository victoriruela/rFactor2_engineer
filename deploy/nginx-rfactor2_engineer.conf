server {
    listen 80;
    server_name telemetria.bot.nu car-setup.com;

    # Match Streamlit maxUploadSize (20000 MB) to avoid 413 on large telemetry files.
    client_max_body_size 20000M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name telemetria.bot.nu;

    ssl_certificate /etc/letsencrypt/live/telemetria.bot.nu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telemetria.bot.nu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Match Streamlit maxUploadSize (20000 MB) to avoid 413 on large telemetry files.
    client_max_body_size 20000M;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd_rfactor2_engineer;

    location /api/ {
        proxy_pass http://127.0.0.1:18000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # AI analysis can take several minutes; avoid 502 from Nginx default 60s timeout.
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    location ^~ /_stcore/upload_file/ {
        proxy_pass http://127.0.0.1:18501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:18501/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

